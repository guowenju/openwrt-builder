name: OpenWrt Release Build

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Release'
        required: false
        default: 'Automated OpenWrt x86_64 squashfs firmware build via GitHub Actions.'
      tag:
        description: 'OpenWrt tag, such as v25.12.3'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    name: Build OpenWrt

    steps:
    - name: Checkout current repository
      uses: actions/checkout@v6

    - name: Check config file exists
      run: |
        CONFIG_FILE=".config"
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "❌ 配置文件 $CONFIG_FILE 不存在"
          exit 1
        fi

    - name: Clone OpenWrt source
      env:
        OPENWRT_TAG: ${{ inputs.tag }}
      run: |
        REPO_URL="https://github.com/openwrt/openwrt.git"

        if ! git ls-remote --exit-code --tags "$REPO_URL" "refs/tags/${OPENWRT_TAG}" >/dev/null; then
          echo "❌ OpenWrt tag 不存在: $OPENWRT_TAG"
          exit 1
        fi

        git clone --depth=1 --branch "$OPENWRT_TAG" "$REPO_URL"

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-setuptools \
          rsync swig unzip zlib1g-dev file wget

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean

    - name: Apply patch
      working-directory: ./openwrt
      run: |
        bash ../scripts/patch_openwrt.sh

    - name: Update feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Install luci-theme-argon
      working-directory: ./openwrt
      run: bash ../scripts/luci-theme-argon.sh
    
    - name: Install luci-app-openclash
      working-directory: ./openwrt
      run: bash ../scripts/luci-app-openclash.sh

    # - name: Install firmware files
    #   working-directory: ./openwrt
    #   run: |
    #     mkdir -p files/lib/firmware
    #     wget https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/iwlwifi-so-a0-gf-a0-89.ucode -P files/lib/firmware
    #     wget https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain/iwlwifi-so-a0-gf-a0.pnvm -P files/lib/firmware

    - name: Build OpenWrt
      working-directory: ./openwrt
      run: |
        cp ../.config .config
        make defconfig
        make download -j"$(nproc)" || make download -j1 V=s
        make -j"$(nproc)" || make -j1 V=s

    - name: Show generated firmware
      run: |
        ls -lh openwrt/bin/targets/x86/64/

    - name: Upload OpenWrt squashfs image artifact
      uses: actions/upload-artifact@v7
      with:
        name: openwrt-squashfs-img
        path: openwrt/bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined-efi.img.gz
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Publish GitHub Release

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6

      - name: Read rootfs part size
        id: firmware_config
        run: |
          ROOTFS_PARTSIZE="$(sed -n 's/^CONFIG_TARGET_ROOTFS_PARTSIZE=//p' .config | tail -n 1)"
          if [ -z "$ROOTFS_PARTSIZE" ]; then
            echo "❌ 未在 .config 中找到 CONFIG_TARGET_ROOTFS_PARTSIZE"
            exit 1
          fi

          TARGET="$(sed -n 's/^CONFIG_TARGET_\([^_=][^=]*\)=y$/\1/p' .config | head -n 1)"
          SUBTARGET="$(sed -n "s/^CONFIG_TARGET_${TARGET}_\([^_=][^=]*\)=y$/\1/p" .config | grep -v '^DEVICE_' | head -n 1)"
          DEVICE="$(sed -n "s/^CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_\(.*\)=y$/\1/p" .config | head -n 1)"

          if [ -z "$TARGET" ] || [ -z "$SUBTARGET" ]; then
            echo "❌ 未在 .config 中找到 CONFIG_TARGET_* 目标平台"
            exit 1
          fi

          TARGET_PLATFORM="${TARGET}/${SUBTARGET}"
          if [ -n "$DEVICE" ]; then
            TARGET_PLATFORM="${TARGET_PLATFORM}/${DEVICE}"
          fi

          echo "rootfs_partsize=${ROOTFS_PARTSIZE}" >> "$GITHUB_OUTPUT"
          echo "target_platform=${TARGET_PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloads
      
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}-${{ github.run_number }}
          name: "OpenWrt ${{ inputs.tag }}"
          files: ./downloads/**/*.img.gz
          body: |
            📦 自动发布版本 ${{ inputs.tag }}

            固件信息:
            - 目标平台: ${{ steps.firmware_config.outputs.target_platform }}
            - RootFS 分区大小: ${{ steps.firmware_config.outputs.rootfs_partsize }} MiB
            - 构建编号: ${{ github.run_number }}
            - 提交: ${{ github.sha }}

            ${{ inputs.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
